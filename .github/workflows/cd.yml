name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  smoke-production:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Smoke web health
        run: |
          URL="${PRODUCTION_WEB_URL:-https://loyala-ai-web.vercel.app}"
          body=$(curl -sf "$URL/api/health")
          echo "$body"
          status=$(echo "$body" | grep -o '"status":"[^"]*"' | head -1)
          echo "Status: $status"
          echo "$body" | grep -qE '"status":"(ok|degraded)"' || exit 1

      - name: Smoke worker health
        run: |
          if [ -z "$PRODUCTION_WORKER_URL" ]; then
            echo "PRODUCTION_WORKER_URL not set — skip"
            exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" "$PRODUCTION_WORKER_URL/health")
          echo "Worker health HTTP $code"
          test "$code" = "200"
        env:
          PRODUCTION_WORKER_URL: ${{ secrets.PRODUCTION_WORKER_URL }}
    env:
      PRODUCTION_WEB_URL: ${{ secrets.PRODUCTION_WEB_URL }}

  notify-failure:
    needs: smoke-production
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - run: echo "::error::Production smoke test failed — verify Vercel/Railway deployments"
