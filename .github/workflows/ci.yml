name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests + journey smoke + RLS static
        run: pnpm test

      - name: RLS cross-tenant integration
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Skipping RLS integration — Supabase secrets not configured"
            exit 0
          fi
          pnpm test:rls
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
          NEXT_PUBLIC_APP_URL: https://fmagence.online
          WORKER_URL: https://placeholder.example.com
          WORKER_API_SECRET: placeholder-secret-min-16-chars
          AI_ALLOW_MOCK: 'true'

      - name: Build worker (deployable bundle)
        run: pnpm --filter worker build:bundle

      - name: Lint
        run: pnpm lint
        continue-on-error: false
  production-smoke:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - name: Smoke web health (degraded OK)
        run: |
          URL="${PRODUCTION_WEB_URL:-https://loyala-ai-web.vercel.app}"
          body=$(curl -sf "$URL/api/health" || echo '{}')
          echo "$body"
          echo "$body" | grep -q '"status"' || (echo "Invalid health response" && exit 1)
        env:
          PRODUCTION_WEB_URL: ${{ secrets.PRODUCTION_WEB_URL }}
